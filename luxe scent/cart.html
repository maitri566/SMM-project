<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Shopping Bag | Luxe Scents</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;700&family=Montserrat:wght@300;400;500;600&display=swap');

        :root {
            --gold: #c5a059;
            --dark: #121212;
            --gray: #888888;
            --light-bg: #faf9f6; /* A sophisticated pearl/off-white */
            --white: #ffffff;
            --border: #eaeaea;
        }

        body {
            background-color: var(--light-bg);
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            color: var(--dark);
        }

        /* --- LUXURY NAVIGATION --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 8%;
            background: rgba(250, 249, 246, 0.9);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .logo {
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 5px;
            color: var(--dark);
            text-transform: uppercase;
        }

        nav a {
            text-decoration: none;
            color: var(--dark);
            margin: 0 15px;
            font-weight: 400;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 2px;
            position: relative;
            transition: color 0.4s ease;
        }

        nav a:hover { color: var(--gold); }

        /* --- EDITORIAL CART LAYOUT --- */
        .cart-wrapper {
            max-width: 900px;
            margin: 80px auto 100px;
            padding: 0 5%;
        }

        .cart-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .cart-header h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            font-weight: 400;
            letter-spacing: 4px;
            margin-bottom: 10px;
            color: var(--dark);
        }

        .cart-header p {
            color: var(--gray);
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* --- CART ITEMS --- */
        .cart-items-container {
            background: var(--white);
            padding: 40px 50px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.03);
            border: 1px solid var(--border);
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 0;
            border-bottom: 1px solid var(--border);
            transition: background 0.3s ease;
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .item-details-group {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .item-icon {
            width: 60px;
            height: 80px;
            background: var(--light-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gold);
            font-size: 1.8rem;
            border: 1px solid var(--border);
        }

        .cart-item-name {
            font-family: 'Cinzel', serif;
            font-weight: 600;
            font-size: 1.3rem;
            color: var(--dark);
            display: block;
            margin-bottom: 5px;
        }

        .cart-item-category {
            font-size: 0.7rem;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .item-price-group {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .cart-item-price {
            font-weight: 500;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        .delete-btn {
            color: #ccc;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            background: none;
            border: none;
            padding: 10px;
        }

        .delete-btn:hover { 
            color: #d9534f; 
            transform: scale(1.1); 
        }

        /* --- CART TOTALS --- */
        .cart-footer {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .cart-total-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 400px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--dark);
            margin-bottom: 30px;
        }

        .cart-total-text {
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .cart-total-amount {
            font-weight: 600;
            font-size: 1.6rem;
        }

        .checkout-btn {
            background: var(--dark);
            color: var(--white);
            border: 1px solid var(--dark);
            padding: 18px 40px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.4s ease;
            width: 100%;
            max-width: 400px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 500;
        }

        .checkout-btn:hover { 
            background: var(--gold); 
            border-color: var(--gold);
            color: var(--white);
        }

        .empty-cart {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-cart i {
            font-size: 3rem;
            color: var(--border);
            margin-bottom: 20px;
        }

        .empty-cart p {
            color: var(--gray);
            letter-spacing: 1px;
            font-size: 0.9rem;
        }

        .empty-cart-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            border: 1px solid var(--dark);
            color: var(--dark);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .empty-cart-btn:hover {
            background: var(--dark);
            color: var(--white);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .cart-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 20px;
            }
            .item-price-group {
                width: 100%;
                justify-content: space-between;
            }
            .cart-items-container {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="logo">LUXE SCENTS</div>
    <nav>
    <a href="index.html">Home</a>
    <a href="collection.html">Fragrance Library</a>
    <a href="promotions.html">Offers</a>
    <a href="blog.html">Editorial</a>
    <a href="contact.html">Contact</a>

    <a href="cart.html" class="nav-icon" title="View Cart" style="margin-left: 20px;">
        <i class="fa-solid fa-cart-shopping"></i>
    </a>
    <a href="login.html" class="nav-icon" title="Login">
        <i class="fa-solid fa-circle-user"></i>
    </a>
</nav>
</header>

<div class="cart-wrapper">
    <div class="cart-header">
        <h1>Your Shopping Bag</h1>
        <p>Secure Checkout</p>
    </div>
    
    <div class="cart-items-container" id="cart-items-list">
        </div>

    <div class="cart-footer" id="cart-footer" style="display: none;">
        <div class="cart-total-box">
            <span class="cart-total-text">Subtotal</span>
            <span class="cart-total-amount">₹<span id="cart-total-amount-val">0</span></span>
        </div>
        <button onclick="alert('Redirecting to secure payment gateway...')" class="checkout-btn">Proceed to Checkout</button>
    </div>
</div>

<script>
    function loadCart() {
        const cart = JSON.parse(localStorage.getItem('luxeCart')) || [];
        const listContainer = document.getElementById('cart-items-list');
        const footerContainer = document.getElementById('cart-footer');
        const totalContainer = document.getElementById('cart-total-amount-val');
        let total = 0;

        if (cart.length === 0) {
            listContainer.innerHTML = `
                <div class="empty-cart">
                    <i class="fa-solid fa-bag-shopping"></i>
                    <p>Your luxurious bag is currently empty.</p>
                    <a href="collection.html" class="empty-cart-btn">Discover Fragrances</a>
                </div>
            `;
            footerContainer.style.display = "none";
            return;
        }

        footerContainer.style.display = "flex";

        listContainer.innerHTML = cart.map((item, index) => {
            const price = parseFloat(item.price);
            if (!isNaN(price)) total += price;
            
            return `
                <div class="cart-item">
                    <div class="item-details-group">
                        <div class="item-icon">
                            <i class="fa-solid fa-bottle-droplet"></i>
                        </div>
                        <div>
                            <span class="cart-item-name">${item.name}</span>
                            <span class="cart-item-category">Eau de Parfum</span>
                        </div>
                    </div>
                    <div class="item-price-group">
                        <span class="cart-item-price">₹${isNaN(price) ? '0' : price.toLocaleString('en-IN')}</span>
                        <button class="delete-btn" onclick="deleteItem(${index})" title="Remove">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                    </div>
                </div>
            `;
        }).join('');

        totalContainer.innerText = total.toLocaleString('en-IN');
    }

    function deleteItem(index) {
        let cart = JSON.parse(localStorage.getItem('luxeCart'));
        cart.splice(index, 1);
        localStorage.setItem('luxeCart', JSON.stringify(cart));
        loadCart(); 
    }

    window.onload = loadCart;
</script>

</body>
</html>
